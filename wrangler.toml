name = "saralops"
main = ".open-next/worker.js"
compatibility_date = "2026-04-29"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

[vars]
NEXT_PUBLIC_APP_NAME = "SaralOps"

# Bind Cloudflare secrets via Cloudflare dashboard (do not add secrets here)
# AUTH_SECRET, AUTH_GOOGLE_ID, AUTH_GOOGLE_SECRET, DATABASE_URL, etc.
