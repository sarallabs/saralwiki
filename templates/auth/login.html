{% extends "base.html" %}
{% block title %}Login - SaralTrack{% endblock %}
{% block auth_content %}
<div class="w-full max-w-md px-6">
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-electric rounded-2xl flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
        </div>
        <h1 class="text-3xl font-bold dark:text-white text-gray-900">SaralTrack</h1>
        <p class="mt-2 dark:text-gray-400 text-gray-600">Sign in to your account</p>
    </div>
    <div class="dark:bg-navy-light bg-white rounded-xl shadow-xl p-8 border dark:border-navy-border border-gray-200">
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm font-medium mb-2">Username or Email</label>
                <input type="text" name="username" required autofocus
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 text-sm">
                    <input type="checkbox" name="remember" class="rounded border-gray-300 text-electric focus:ring-electric">
                    <span>Remember me</span>
                </label>
            </div>
            <button type="submit" class="w-full py-3 bg-electric hover:bg-electric-dark text-white rounded-lg font-semibold transition-colors">
                Sign In
            </button>
        </form>
        <p class="mt-6 text-center text-sm dark:text-gray-400 text-gray-600">
            Access is by invitation only. Contact your administrator.
        </p>
    </div>
</div>
{% endblock %}
