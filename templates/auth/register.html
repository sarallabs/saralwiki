{% extends "base.html" %}
{% block title %}Register - SaralTrack{% endblock %}
{% block auth_content %}
<div class="w-full max-w-md px-6">
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-electric rounded-2xl flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
            </svg>
        </div>
        <h1 class="text-3xl font-bold dark:text-white text-gray-900">Create Account</h1>
        <p class="mt-2 dark:text-gray-400 text-gray-600">Join your team on SaralTrack</p>
    </div>
    <div class="dark:bg-navy-light bg-white rounded-xl shadow-xl p-8 border dark:border-navy-border border-gray-200">
        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm font-medium mb-2">Full Name</label>
                <input type="text" name="full_name" required
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Username</label>
                <input type="text" name="username" required minlength="3"
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" name="email" required
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" name="password" required minlength="6"
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Confirm Password</label>
                <input type="password" name="confirm_password" required
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <button type="submit" class="w-full py-3 bg-electric hover:bg-electric-dark text-white rounded-lg font-semibold transition-colors">
                Create Account
            </button>
        </form>
        <p class="mt-6 text-center text-sm dark:text-gray-400 text-gray-600">
            Already have an account? <a href="{{ url_for('auth.login') }}" class="text-electric hover:underline font-medium">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
