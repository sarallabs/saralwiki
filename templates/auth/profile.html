{% extends "base.html" %}
{% block title %}Profile - SaralTrack{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">My Profile</h1>
    <div class="dark:bg-navy-light bg-white rounded-xl border dark:border-navy-border border-gray-200 p-6">
        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-16 h-16 rounded-full bg-electric flex items-center justify-center text-white text-2xl font-bold">
                    {{ current_user.get_initials() }}
                </div>
                <div>
                    <p class="font-semibold text-lg">{{ current_user.full_name }}</p>
                    <p class="dark:text-gray-400 text-gray-500 text-sm">@{{ current_user.username }} &middot; {{ current_user.role }}</p>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Full Name</label>
                <input type="text" name="full_name" value="{{ current_user.full_name }}"
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" name="email" value="{{ current_user.email }}"
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Avatar</label>
                <input type="file" name="avatar" accept="image/*"
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">New Password (leave blank to keep current)</label>
                <input type="password" name="new_password"
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <div class="border-t dark:border-navy-border border-gray-200 pt-4">
                <h3 class="text-sm font-semibold mb-3">Notification Preferences</h3>
                <label class="flex items-center gap-3 cursor-pointer group">
                    <input type="checkbox" name="email_notifications" value="1"
                           {% if current_user.email_notifications %}checked{% endif %}
                           class="w-4 h-4 rounded text-electric">
                    <div>
                        <p class="text-sm font-medium">Email Notifications</p>
                        <p class="text-xs dark:text-gray-400 text-gray-500">Receive email alerts for assignments, mentions, status changes and deadline warnings.</p>
                    </div>
                </label>
            </div>
            <button type="submit" class="px-6 py-3 bg-electric hover:bg-electric-dark text-white rounded-lg font-semibold transition-colors">
                Save Changes
            </button>
        </form>
    </div>
</div>
{% endblock %}
