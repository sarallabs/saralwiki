{% extends "base.html" %}
{% block title %}Edit {{ project.name }} - SaralTrack{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Edit Project</h1>
    <div class="dark:bg-navy-light bg-white rounded-xl border dark:border-navy-border border-gray-200 p-6">
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm font-medium mb-2">Project Name</label>
                <input type="text" name="name" value="{{ project.name }}"
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Description</label>
                <textarea name="description" rows="3"
                          class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">{{ project.description }}</textarea>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Status</label>
                <select name="status" class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 text-sm">
                    {% for s in ['planning', 'active', 'on_hold', 'completed', 'archived'] %}
                    <option value="{{ s }}" {% if project.status == s %}selected{% endif %}>{{ s|replace('_', ' ')|capitalize }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Color</label>
                <input type="color" name="color" value="{{ project.color }}" class="w-16 h-10 rounded cursor-pointer border-0">
            </div>
            <div class="flex gap-3">
                <button type="submit" class="px-6 py-3 bg-electric hover:bg-electric-dark text-white rounded-lg font-semibold transition-colors">Save Changes</button>
                <a href="{{ url_for('projects.project_overview', key=project.key) }}" class="px-6 py-3 dark:bg-navy-lighter bg-gray-100 rounded-lg font-medium transition-colors">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
