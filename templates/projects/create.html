{% extends "base.html" %}
{% block title %}New Project - SaralTrack{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Create New Project</h1>
    <div class="dark:bg-navy-light bg-white rounded-xl border dark:border-navy-border border-gray-200 p-6">
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm font-medium mb-2">Project Name</label>
                <input type="text" name="name" required placeholder="e.g., Mobile App Redesign"
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Project Key</label>
                <input type="text" name="key" required maxlength="10" placeholder="e.g., MAR" style="text-transform: uppercase"
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm font-mono">
                <p class="text-xs dark:text-gray-500 text-gray-400 mt-1">2-10 letters, used in ticket keys like MAR-1, MAR-2</p>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Description</label>
                <textarea name="description" rows="3" placeholder="Brief description of the project..."
                          class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Color</label>
                <input type="color" name="color" value="#2D8CFF" class="w-16 h-10 rounded cursor-pointer border-0">
            </div>
            <div class="flex gap-3">
                <button type="submit" class="px-6 py-3 bg-electric hover:bg-electric-dark text-white rounded-lg font-semibold transition-colors">
                    Create Project
                </button>
                <a href="{{ url_for('projects.list_projects') }}" class="px-6 py-3 dark:bg-navy-lighter bg-gray-100 rounded-lg font-medium transition-colors dark:hover:bg-navy-border hover:bg-gray-200">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
