{% extends "base.html" %}
{% block title %}New Sprint - {{ project.name }} - SaralTrack{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{{ url_for('projects.project_overview', key=project.key) }}" class="dark:text-gray-400 text-gray-500 hover:text-electric">{{ project.key }}</a>
        <span class="dark:text-gray-600 text-gray-300">/</span>
        <h1 class="text-xl font-bold">Create Sprint</h1>
    </div>
    <div class="dark:bg-navy-light bg-white rounded-xl border dark:border-navy-border border-gray-200 p-6">
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm font-medium mb-2">Sprint Name</label>
                <input type="text" name="name" required placeholder="e.g., Sprint 1"
                       class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Goal</label>
                <textarea name="goal" rows="3" placeholder="What should be accomplished this sprint?"
                          class="w-full px-4 py-3 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 focus:outline-none focus:ring-2 focus:ring-electric text-sm"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Start Date</label>
                    <input type="datetime-local" name="start_date"
                           class="w-full px-3 py-2 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">End Date</label>
                    <input type="datetime-local" name="end_date"
                           class="w-full px-3 py-2 rounded-lg dark:bg-navy bg-gray-50 border dark:border-navy-border border-gray-300 text-sm">
                </div>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="px-6 py-3 bg-electric hover:bg-electric-dark text-white rounded-lg font-semibold transition-colors">Create Sprint</button>
                <a href="{{ url_for('projects.project_overview', key=project.key) }}" class="px-6 py-3 dark:bg-navy-lighter bg-gray-100 rounded-lg font-medium transition-colors">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
